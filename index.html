<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>日本語 Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#333;--border2:#444;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --accent:#7c6fcd;--accent2:#9d92e0;
  --green:#4caf7d;--red:#e05555;--yellow:#f0b429;
  --blue:#4a9eff;
  --sidebar:260px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;height:100vh;height:-webkit-fill-available;min-height:-webkit-fill-available;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:transform 0.25s ease;
  z-index:100;
}
#sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-header h1{font-size:18px;font-weight:600;color:var(--text);letter-spacing:0.5px}
#sidebar-header p{font-size:12px;color:var(--text3);margin-top:3px}
.nav-section{padding:8px 0}
.nav-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;cursor:pointer;font-size:14px;color:var(--text2);
  transition:background 0.15s,color 0.15s;user-select:none;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item .arrow{font-size:11px;transition:transform 0.2s;color:var(--text3)}
.nav-item.open .arrow{transform:rotate(90deg)}
.nav-sub{display:none;background:var(--bg)}
.nav-sub.open{display:block}
.nav-sub-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px 9px 28px;cursor:pointer;
  font-size:13px;color:var(--text3);transition:background 0.15s,color 0.15s;
}
.nav-sub-item:hover{background:var(--bg3);color:var(--text2)}
.nav-sub-item.active{color:var(--accent);background:var(--bg3)}
.nav-sub-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.nav-sub-item.done .dot{background:var(--green)}
.nav-sub-item.active .dot{background:var(--accent)}
.prog-mini{margin:8px 0 0;height:3px;background:var(--border);border-radius:2px}
.prog-mini-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s}

/* MOBILE OVERLAY */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99}
#overlay.show{display:block}

/* HAMBURGER */
#hamburger{
  display:none;background:none;border:none;color:var(--text);
  font-size:22px;cursor:pointer;padding:0 4px;line-height:1;
}

/* MAIN */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
#topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
#topbar h2{font-size:15px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#topbar .meta{font-size:12px;color:var(--text3);flex-shrink:0}

/* STATS BAR */
#statsbar{
  display:flex;gap:8px;padding:12px 16px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.stat-card{
  flex:1;min-width:60px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;
}
.stat-card .val{font-size:20px;font-weight:600;color:var(--text)}
.stat-card .lbl{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}

/* QUIZ AREA */
#quiz-area{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 20px;
}
.quiz-char{
  font-size:90px;line-height:1;color:var(--text);
  text-align:center;margin-bottom:8px;
}
.quiz-sub{font-size:13px;color:var(--text3);margin-bottom:28px;text-align:center}
.quiz-choices{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  width:100%;max-width:420px;
}
.choice-btn{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:18px 12px;font-size:16px;color:var(--text);
  cursor:pointer;transition:background 0.15s,border-color 0.15s,transform 0.1s;
  text-align:center;font-family:inherit;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.choice-btn:active{transform:scale(0.97)}
.choice-btn.correct{background:#1a3a26;border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:#3a1a1a;border-color:var(--red);color:var(--red);animation:shake 0.3s}
.choice-btn.disabled{pointer-events:none;opacity:0.4}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.feedback{margin-top:18px;font-size:14px;text-align:center;min-height:22px;font-weight:500}
.feedback.good{color:var(--green)}
.feedback.bad{color:var(--red)}

/* HOME */
#home{padding:24px 20px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:16px}
.home-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:18px;cursor:pointer;transition:border-color 0.15s,background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.home-card:hover,.home-card:active{border-color:var(--accent);background:var(--bg4)}
.home-card h3{font-size:14px;font-weight:500;margin-bottom:6px}
.home-card p{font-size:12px;color:var(--text3)}
.home-card .big{font-size:30px;margin-bottom:8px}
.prog-bar-wrap{margin-top:10px;height:4px;background:var(--border);border-radius:2px}
.prog-bar-fill{height:100%;border-radius:2px;transition:width 0.5s}

/* RESULT */
#result-overlay{display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center}
#result-overlay.show{display:flex}
#result-overlay .big-emoji{font-size:60px;margin-bottom:16px}
#result-overlay h2{font-size:22px;font-weight:600;margin-bottom:8px}
#result-overlay p{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s;font-family:inherit;touch-action:manipulation}
.btn:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover,.btn-outline:active{background:var(--bg3);color:var(--text)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* PHRASES */
#phrases-area{flex:1;display:flex;flex-direction:column;padding:20px;gap:16px;max-width:680px;margin:0 auto;width:100%}
.phrase-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.phrase-select{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;
  flex:1;min-width:120px;
}
.phrase-select:focus{outline:none;border-color:var(--accent)}
.phrase-gen-btn{
  background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;
  font-family:inherit;white-space:nowrap;transition:background 0.15s;
  touch-action:manipulation;flex-shrink:0;
}
.phrase-gen-btn:hover{background:var(--accent2)}
.phrase-gen-btn:disabled{opacity:0.5;cursor:not-allowed}
.phrase-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:20px;display:flex;flex-direction:column;gap:12px;
}
.phrase-jp{font-size:22px;line-height:1.5;color:var(--text);letter-spacing:0.5px}
.phrase-romaji{font-size:13px;color:var(--text3);font-style:italic;display:none}
.phrase-romaji.show{display:block}
.phrase-fr{font-size:15px;color:var(--text2);display:none;padding-top:8px;border-top:1px solid var(--border)}
.phrase-fr.show{display:block}
.phrase-note{font-size:12px;color:var(--text3);display:none;padding-top:6px}
.phrase-note.show{display:block}
.phrase-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.phrase-btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;
  font-family:inherit;transition:background 0.15s,color 0.15s;touch-action:manipulation;
}
.phrase-btn:hover{background:var(--bg4);color:var(--text)}
.phrase-btn.active{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.phrase-lvl-badge{
  display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;
  font-weight:500;margin-bottom:4px;
}
.loading-dots{display:flex;gap:6px;align-items:center;padding:20px 0;justify-content:center}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1s infinite}
.loading-dots span:nth-child(2){animation-delay:0.15s}
.loading-dots span:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-6px);opacity:1}}
.phrases-list{display:flex;flex-direction:column;gap:12px}
.ph-saved-badge{font-size:11px;color:var(--green);margin-left:8px}

/* MOBILE */
@media(max-width:640px){
  #hamburger{display:block}
  #sidebar{
    position:fixed;left:0;top:0;bottom:0;
    transform:translateX(-100%);
  }
  #sidebar.open{transform:translateX(0)}
  .quiz-char{font-size:72px}
  .choice-btn{padding:16px 8px;font-size:15px}
  #statsbar{gap:6px;padding:10px 12px}
  .stat-card{padding:7px 8px}
  .stat-card .val{font-size:18px}
  #home{padding:20px 16px}
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>日本語 Trainer</h1>
    <p>Progression globale</p>
    <div class="prog-mini"><div class="prog-mini-fill" id="global-prog" style="width:0%"></div></div>
  </div>
  <div id="nav-content"></div>
  <div class="nav-section" style="border-top:1px solid var(--border);margin-top:auto">
    <div class="nav-item" id="phrases-nav-btn" onclick="loadPhrases();closeSidebar()">
      <span>🗣 Phrases IA</span>
      <span style="font-size:10px;background:#7c6fcd22;color:var(--accent);padding:2px 6px;border-radius:4px;font-weight:500">IA</span>
    </div>
  </div>

<div id="main">
  <div id="topbar">
    <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <h2 id="topbar-title">Accueil</h2>
    <div class="meta" id="topbar-meta"></div>
  </div>
  <div id="statsbar" style="display:none">
    <div class="stat-card"><div class="val" id="stat-correct">0</div><div class="lbl">Corrects</div></div>
    <div class="stat-card"><div class="val" id="stat-streak">0</div><div class="lbl">Série</div></div>
    <div class="stat-card"><div class="val" id="stat-mastered">0</div><div class="lbl">Maîtrisés</div></div>
    <div class="stat-card"><div class="val" id="stat-acc">0%</div><div class="lbl">Précision</div></div>
  </div>
  <div id="content-area"></div>
</div>

<script>
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function buildLevels(arr, stepSize) {
  const levels = [];
  for (let i = 0; i < arr.length; i += stepSize) {
    levels.push(arr.slice(0, i + stepSize));
  }
  return levels;
}

const K_LEVELS = buildLevels(KATAKANA, 5);
const KJ_LEVELS = buildLevels(KANJI_ALL, 15);

  {id:'hira', label:'Hiragana', emoji:'ひ', levels: H_LEVELS, pool: HIRAGANA, color:'#7c6fcd'},

  localStorage.setItem('jp_progress', JSON.stringify(state.progress));
  localStorage.setItem('jp_total', state.totalAnswered);
  localStorage.setItem('jp_correct', state.totalCorrect);
}

function getProgKey(secId, lvl) { return secId+'_'+lvl; }

function getLevelProg(secId, lvl) {
  return state.progress[getProgKey(secId,lvl)] || {mastered:0, total:0, done:false};
}

function getSectionProg(sec) {
  let m=0, t=0;
  sec.levels.forEach((_,i) => {
    const p = getLevelProg(sec.id, i);
    m += p.mastered||0;
    t += sec.levels[i].length;
  });
  return {pct: t>0?Math.round(m/t*100):0, mastered:m, total:t};
}

function buildNav() {
  const nav = document.getElementById('nav-content');
  nav.innerHTML = '';
  SECTIONS.forEach(sec => {
    const sp = getSectionProg(sec);
    const wrap = document.createElement('div');
    wrap.className = 'nav-section';

    const title = document.createElement('div');
    title.className = 'nav-item';
    title.innerHTML = `<span>${sec.emoji} ${sec.label} <span style="font-size:11px;color:var(--text3);margin-left:6px">${sp.pct}%</span></span><span class="arrow">›</span>`;
    title.onclick = () => { title.classList.toggle('open'); sub.classList.toggle('open'); };
    wrap.appendChild(title);

    const sub = document.createElement('div');
    sub.className = 'nav-sub';

    if (sec.id === 'kanji' && sp.mastered > 30) {
      const mixItem = document.createElement('div');
      mixItem.className = 'nav-sub-item';
      mixItem.innerHTML = `<span class="dot" style="background:#f0b429"></span>⚡ Mix tout les Kanji`;
      mixItem.onclick = () => { loadQuiz(sec.id, -1); closeSidebar(); };
      sub.appendChild(mixItem);
    }

    sec.levels.forEach((_, i) => {
      const p = getLevelProg(sec.id, i);
      const lvlPct = sec.levels[i].length>0 ? Math.round((p.mastered||0)/sec.levels[i].length*100) : 0;
      const item = document.createElement('div');
      item.className = 'nav-sub-item' + (p.done?' done':'');
      item.dataset.sec = sec.id;
      item.dataset.lvl = i;
      item.innerHTML = `<span class="dot"></span>Niveau ${i+1} <span style="margin-left:auto;font-size:11px;color:var(--text3)">${lvlPct}%</span>`;
      item.onclick = () => { loadQuiz(sec.id, i); closeSidebar(); };
      sub.appendChild(item);
    });

    wrap.appendChild(sub);
    nav.appendChild(wrap);
  });

  let gm=0, gt=0;
  SECTIONS.forEach(s => { const p=getSectionProg(s); gm+=p.mastered; gt+=p.total; });
  const gp = gt>0 ? Math.round(gm/gt*100) : 0;
  document.getElementById('global-prog').style.width = gp+'%';
}

function loadQuiz(secId, lvlIdx) {
  const sec = SECTIONS.find(s=>s.id===secId);
  state.page='quiz'; state.sectionId=secId; state.levelIdx=lvlIdx;
  state.session={correct:0,wrong:0,streak:0,maxStreak:0,total:0};
  state.masteredSet = new Set();

  let pool = lvlIdx===-1 ? [...sec.pool] : [...sec.levels[lvlIdx]];
  shuffle(pool);
  state.quizQueue = [...pool];

  document.getElementById('topbar-title').textContent = `${sec.label} — ${lvlIdx===-1?'Mix':'Niv.'+(lvlIdx+1)}`;
  document.getElementById('topbar-meta').textContent = `${pool.length} car.`;
  document.getElementById('statsbar').style.display='flex';

  document.querySelectorAll('.nav-sub-item').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.sec===secId && parseInt(el.dataset.lvl)===lvlIdx) el.classList.add('active');
  });

  updateStats();
  renderQuiz();
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function renderQuiz() {
  const ca = document.getElementById('content-area');
  ca.innerHTML='';

  if (state.quizQueue.length===0) { showResult(); return; }

  state.currentQ = state.quizQueue[0];
  const sec = SECTIONS.find(s=>s.id===state.sectionId);
  const wrong = [...sec.pool].filter(x=>x.char!==state.currentQ.char);
  shuffle(wrong);
  const choices = [state.currentQ, ...wrong.slice(0,3)];
  shuffle(choices);
  state.wrongThisRound = false;

  const isKanji = state.sectionId==='kanji';
  const choiceLabel = c => isKanji ? c.read : c.rom;

  const div = document.createElement('div');
  div.id='quiz-area';
  div.innerHTML = `
    <div style="text-align:center;margin-bottom:8px">
      <div class="quiz-char">${state.currentQ.char}</div>
      ${isKanji
        ? `<div style="font-size:14px;color:var(--text2);margin-bottom:4px">${state.currentQ.mean}</div><div class="quiz-sub">Quelle est la lecture ?</div>`
        : `<div class="quiz-sub">Romanisation ?</div>`}
    </div>
    <div class="quiz-choices" id="choices">
      ${choices.map(c=>`<button class="choice-btn" onclick="checkAnswer(this,'${c.char.replace(/'/g,"&#39;")}')">${choiceLabel(c)}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
  `;
  ca.appendChild(div);
}

function checkAnswer(btn, charClicked) {
  const correct = state.currentQ.char;
  const sec = SECTIONS.find(s=>s.id===state.sectionId);
  const fb = document.getElementById('feedback');

  if (charClicked === correct) {
    btn.classList.add('correct');
    state.session.total++;
    state.totalAnswered++;
    if (!state.wrongThisRound) {
      state.session.correct++;
      state.session.streak++;
      state.totalCorrect++;
      if (state.session.streak>state.session.maxStreak) state.session.maxStreak=state.session.streak;
      state.masteredSet.add(correct);
      const k = getProgKey(state.sectionId, state.levelIdx);
      if (!state.progress[k]) state.progress[k]={mastered:0,total:0,done:false};
      state.progress[k].mastered = state.masteredSet.size;
      state.progress[k].total = sec.levels[state.levelIdx]?.length||0;
      if (state.masteredSet.size >= (sec.levels[state.levelIdx]?.length||Infinity)) state.progress[k].done=true;
      saveProgress();
      buildNav();
    }
    fb.className='feedback good';
    fb.textContent = state.sectionId==='kanji' ? `✓ ${state.currentQ.read} — ${state.currentQ.mean}` : '✓ Correct !';
    document.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
    state.quizQueue.shift();
    updateStats();
    setTimeout(renderQuiz, 900);
  } else {
    btn.classList.add('wrong','disabled');
    state.wrongThisRound = true;
    state.session.streak = 0;
    fb.className='feedback bad';
    fb.textContent = '✗ Essaie encore…';
    updateStats();
  }
}

function updateStats() {
  const s = state.session;
  document.getElementById('stat-correct').textContent = s.correct;
  document.getElementById('stat-streak').textContent = s.streak;
  document.getElementById('stat-mastered').textContent = state.masteredSet ? state.masteredSet.size : 0;
  const acc = state.totalAnswered>0 ? Math.round(state.totalCorrect/state.totalAnswered*100) : 0;
  document.getElementById('stat-acc').textContent = acc+'%';
}

function showResult() {
  const ca = document.getElementById('content-area');
  ca.innerHTML='';
  const s = state.session;
  const acc = s.total>0 ? Math.round(s.correct/s.total*100) : 0;
  const div = document.createElement('div');
  div.id='result-overlay'; div.className='show';
  div.innerHTML = `
    <div class="big-emoji">${acc>=80?'🎉':acc>=50?'💪':'😤'}</div>
    <h2>${acc>=80?'Excellent !':acc>=50?'Bien joué !':'Continue !'}</h2>
    <p>${s.correct} corrects sur ${s.total}<br>Précision ${acc}% · Meilleure série : ${s.maxStreak}</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="loadQuiz(state.sectionId,state.levelIdx)">Rejouer</button>
      <button class="btn btn-outline" onclick="loadHome()">Accueil</button>
    </div>
  `;
  ca.appendChild(div);
}

// ===== PHRASES IA =====
const PHRASE_LEVELS = [
  {id:'n5', label:'N5 — Débutant', color:'#4caf7d', desc:'Phrases très simples, vocabulaire de base'},
  {id:'n4', label:'N4 — Élémentaire', color:'#4a9eff', desc:'Phrases courtes du quotidien'},
  {id:'n3', label:'N3 — Intermédiaire', color:'#7c6fcd', desc:'Conversations courantes'},
  {id:'n2', label:'N2 — Avancé', color:'#f0b429', desc:'Expressions naturelles, nuances'},
  {id:'n1', label:'N1 — Courant', color:'#e05555', desc:'Langue naturelle complexe'},
  {id:'native', label:'Natif — Argot/Culture', color:'#ff6b9d', desc:'Verlan japonais, culture pop, internet'},
];

const PHRASE_TOPICS = [
  'vie quotidienne','travail / bureau','voyage / transport','nourriture / restaurant',
  'famille / relations','technologie / réseaux','santé / sport','culture pop / anime',
  'shopping','météo / nature','émotions / sentiments','actualités / société',
  'philosophie / opinions','argot / langage informel','manga / jeux vidéo',
];

let phraseState = {
  level: 'n3',
  topic: 'vie quotidienne',
  cards: [],
  loading: false,
  savedPhrases: JSON.parse(localStorage.getItem('jp_saved_phrases')||'[]'),
};

function savePhrases() {
  localStorage.setItem('jp_saved_phrases', JSON.stringify(phraseState.savedPhrases));
}

function loadPhrases() {
  document.getElementById('topbar-title').textContent = '🗣 Phrases IA';
  document.getElementById('topbar-meta').textContent = 'Illimité';
  document.getElementById('statsbar').style.display = 'none';
  document.querySelectorAll('.nav-sub-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('phrases-nav-btn').style.color = 'var(--accent)';

  const ca = document.getElementById('content-area');
  ca.innerHTML = '';

  const area = document.createElement('div');
  area.id = 'phrases-area';
  area.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="phrase-controls">
        <select class="phrase-select" id="ph-level-sel" onchange="phraseState.level=this.value">
          ${PHRASE_LEVELS.map(l=>`<option value="${l.id}" ${l.id===phraseState.level?'selected':''}>${l.label}</option>`).join('')}
        </select>
        <select class="phrase-select" id="ph-topic-sel" onchange="phraseState.topic=this.value">
          ${PHRASE_TOPICS.map(t=>`<option value="${t}" ${t===phraseState.topic?'selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
        </select>
        <button class="phrase-gen-btn" id="ph-gen-btn" onclick="generatePhrases()">Générer ✨</button>
      </div>
      <div style="font-size:12px;color:var(--text3)" id="ph-desc">${PHRASE_LEVELS.find(l=>l.id===phraseState.level).desc}</div>
    </div>
    <div id="phrases-list" class="phrases-list"></div>
    <div style="text-align:center;padding:8px 0" id="ph-more-wrap" style="display:none">
      <button class="phrase-gen-btn" id="ph-more-btn" onclick="generatePhrases(true)" style="display:none;background:var(--bg3);color:var(--text2);border:1px solid var(--border2)">+ Générer d'autres phrases</button>
    </div>
    ${phraseState.savedPhrases.length>0?`
    <div style="margin-top:8px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">⭐ Sauvegardées (${phraseState.savedPhrases.length})</div>
      <button class="phrase-btn" onclick="showSaved()">Voir mes phrases sauvegardées</button>
    </div>`:''}
  `;

  // sync selects
  area.querySelector('#ph-level-sel').addEventListener('change', function(){
    phraseState.level = this.value;
    area.querySelector('#ph-desc').textContent = PHRASE_LEVELS.find(l=>l.id===this.value).desc;
  });
  area.querySelector('#ph-topic-sel').addEventListener('change', function(){ phraseState.topic = this.value; });

  ca.appendChild(area);
}

async function generatePhrases(append=false) {
  if (phraseState.loading) return;
  phraseState.loading = true;

  const btn = document.getElementById('ph-gen-btn');
  const list = document.getElementById('phrases-list');
  const lvl = PHRASE_LEVELS.find(l=>l.id===phraseState.level);

  btn.disabled = true;
  btn.textContent = '…';

  if (!append) list.innerHTML = '';

  // Loading indicator
  const loader = document.createElement('div');
  loader.className = 'loading-dots';
  loader.innerHTML = '<span></span><span></span><span></span>';
  list.appendChild(loader);

  const prompt = `Tu es un professeur de japonais expert. Génère exactement 5 phrases en japonais de niveau ${lvl.label} sur le thème "${phraseState.topic}".

Réponds UNIQUEMENT avec un JSON valide, sans markdown, sans texte avant ou après :
[
  {
    "jp": "phrase en japonais avec kanji/hiragana naturels",
    "romaji": "transcription romaji complète",
    "fr": "traduction française naturelle",
    "note": "explication courte d'un point grammatical ou culturel intéressant (max 60 mots)"
  }
]

Règles :
- Niveau ${lvl.id.toUpperCase()} authentique, pas trop simple ni trop complexe pour ce niveau
- Thème ${phraseState.topic} respecté
- Phrases variées (questions, affirmations, expressions idiomatiques selon le niveau)
- Pour niveau "native" : inclure argot, expressions internet, langage courant non-formel
- JSON uniquement, pas de backticks`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '[]';
    const clean = text.replace(/```json|```/g,'').trim();
    const phrases = JSON.parse(clean);

    list.removeChild(loader);

    phrases.forEach(p => {
      const card = buildPhraseCard(p, lvl);
      list.appendChild(card);
    });

    const moreBtn = document.getElementById('ph-more-btn');
    if (moreBtn) { moreBtn.style.display='inline-block'; }

  } catch(e) {
    list.removeChild(loader);
    const err = document.createElement('div');
    err.style.cssText='color:var(--red);font-size:13px;padding:12px';
    err.textContent = 'Erreur de génération. Vérifie ta connexion et réessaie.';
    list.appendChild(err);
  }

  phraseState.loading = false;
  btn.disabled = false;
  btn.textContent = 'Générer ✨';
}

function buildPhraseCard(p, lvl) {
  const isSaved = phraseState.savedPhrases.some(s=>s.jp===p.jp);
  const card = document.createElement('div');
  card.className = 'phrase-card';
  card.dataset.jp = p.jp;

  const lvlColor = lvl ? lvl.color : '#7c6fcd';
  const lvlLabel = lvl ? lvl.id.toUpperCase() : '';

  card.innerHTML = `
    <div>
      <span class="phrase-lvl-badge" style="background:${lvlColor}22;color:${lvlColor}">${lvlLabel}</span>
      <div class="phrase-jp">${p.jp}</div>
    </div>
    <div class="phrase-romaji" id="rom-${btoa(encodeURIComponent(p.jp)).slice(0,8)}">${p.romaji}</div>
    <div class="phrase-fr" id="fr-${btoa(encodeURIComponent(p.jp)).slice(0,8)}">${p.fr}</div>
    <div class="phrase-note" id="note-${btoa(encodeURIComponent(p.jp)).slice(0,8)}">💡 ${p.note}</div>
    <div class="phrase-actions">
      <button class="phrase-btn" onclick="togglePhrasePart(this,'rom-${btoa(encodeURIComponent(p.jp)).slice(0,8)}')">Romaji</button>
      <button class="phrase-btn" onclick="togglePhrasePart(this,'fr-${btoa(encodeURIComponent(p.jp)).slice(0,8)}')">Traduction</button>
      <button class="phrase-btn" onclick="togglePhrasePart(this,'note-${btoa(encodeURIComponent(p.jp)).slice(0,8)}')">Note</button>
      <button class="phrase-btn ${isSaved?'active':''}" id="save-${btoa(encodeURIComponent(p.jp)).slice(0,8)}" onclick="toggleSavePhrase(this,'${encodeURIComponent(JSON.stringify(p))}')">${isSaved?'⭐ Sauvegardée':'☆ Sauvegarder'}</button>
    </div>
  `;
  return card;
}

function togglePhrasePart(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('show');
  btn.classList.toggle('active');
}

function toggleSavePhrase(btn, encodedP) {
  const p = JSON.parse(decodeURIComponent(encodedP));
  const idx = phraseState.savedPhrases.findIndex(s=>s.jp===p.jp);
  if (idx===-1) {
    phraseState.savedPhrases.push(p);
    btn.textContent = '⭐ Sauvegardée';
    btn.classList.add('active');
  } else {
    phraseState.savedPhrases.splice(idx,1);
    btn.textContent = '☆ Sauvegarder';
    btn.classList.remove('active');
  }
  savePhrases();
}

function showSaved() {
  const ca = document.getElementById('content-area');
  ca.innerHTML = '';
  const area = document.createElement('div');
  area.id = 'phrases-area';

  const header = document.createElement('div');
  header.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:4px';
  header.innerHTML = `
    <button class="phrase-btn" onclick="loadPhrases()">← Retour</button>
    <span style="font-size:15px;font-weight:500">⭐ Phrases sauvegardées (${phraseState.savedPhrases.length})</span>
  `;
  area.appendChild(header);

  if (phraseState.savedPhrases.length===0) {
    area.innerHTML += '<div style="color:var(--text3);font-size:13px;padding:20px 0">Aucune phrase sauvegardée.</div>';
  } else {
    const list = document.createElement('div');
    list.className = 'phrases-list';
    phraseState.savedPhrases.forEach(p => {
      list.appendChild(buildPhraseCard(p, null));
    });
    area.appendChild(list);
  }
  ca.appendChild(area);
}

buildNav();
loadHome();
</script>
</body>
</html>
